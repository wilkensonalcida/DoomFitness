<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Locked — Do Your Squats</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, system-ui, sans-serif;
    background: #0d0d12;
    color: #fff;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding-top: 40px;
  }
  h1 { font-size: 22px; margin-bottom: 4px; }
  .sub { color: #999; margin-bottom: 18px; font-size: 14px; }
  #camWrap {
    position: relative;
    width: 90vw;
    max-width: 420px;
    aspect-ratio: 3 / 4;
    border-radius: 20px;
    overflow: hidden;
    background: #000;
    border: 2px solid #333;
  }
  video, canvas#overlay {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    transform: scaleX(-1);
  }
  #repCounter { margin-top: 20px; text-align: center; }
  #repCount { font-size: 56px; font-weight: 800; color: #4ade80; }
  #repGoal { color: #777; font-size: 14px; }
  #stateLabel {
    margin-top: 6px; font-size: 13px; color: #666;
    letter-spacing: 1px; text-transform: uppercase;
  }
  #startBtn {
    margin-top: 22px; padding: 12px 28px; border-radius: 999px;
    border: none; font-size: 15px; font-weight: 600; cursor: pointer;
    background: #4ade80; color: #06240f;
  }
</style>
</head>
<body>
  <h1>Feed locked 🔒</h1>
  <div class="sub">Do <span id="repGoalTop">5</span> squats to keep scrolling</div>

  <div id="camWrap">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="overlay"></canvas>
  </div>

  <div id="repCounter">
    <div id="repCount">0</div>
    <div id="repGoal">/ 5 squats</div>
    <div id="stateLabel">waiting for camera...</div>
  </div>

  <button id="startBtn">Start Camera</button>

  <script src="lib/tf.min.js"></script>
  <script src="lib/pose-detection.min.js"></script>
  <script src="lockscreen.js"></script>
</body>
</html>
</html>
