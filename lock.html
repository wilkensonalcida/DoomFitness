<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>DoomFitness Lock</title>
    <style>
      body {
        margin: 0;
        background: black;
        color: white;
        font-family: sans-serif;
        text-align: center;
      }
      #camera {
        width: 100vw;
        height: 100vh;
        object-fit: cover;
        background: #111;
      }
      #message {
        position: absolute;

        width: 100%;

        font-size: 24px;

  <body>
    <div id="message">Do 5 squats to unlock</div>
    <video id="camera" autoplay playsinline></video>

    <script type="module" src="lock.js"></script>
  </body>
</html>
