<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>DoomFitness Lock</title>
<style>
  
  :root {
    --bg: #0a0d0a;
    --accent: #7ed957;         /* brand green */
    --accent-bright: #a4f04a;
    --text: #eafce0;
    --muted: #8a9a83;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: -apple-system, system-ui, "Segoe UI", sans-serif;
    background: var(--bg); color: var(--text); overflow: hidden;
  }

  /* camera + skeleton are painted onto this one canvas (kept aligned by code) */
  #stage { position: fixed; inset: 0; width: 100vw; height: 100vh; background: #000; }

  #hud { position: fixed; inset: 0; z-index: 10; pointer-events: none; }

  /* subtle scrim so bottom UI stays readable over the camera */
  #scrim {
    position: absolute; inset: 0; pointer-events: none;
    background:
      radial-gradient(120% 60% at 50% 0%, rgba(126,217,87,0.10), transparent 55%),
      linear-gradient(0deg, rgba(10,13,10,0.85), rgba(10,13,10,0) 32%);
  }

  /* ---- top lock banner ---- */
  #banner {
    position: absolute; top: 0; left: 0; right: 0;
    padding: 22px 20px 30px; display: flex; align-items: center; justify-content: center; gap: 14px;
    background: linear-gradient(180deg, rgba(126,217,87,0.16), rgba(126,217,87,0));
  }
  #banner .ic { color: var(--accent); filter: drop-shadow(0 0 10px rgba(126,217,87,0.55)); flex: 0 0 auto; }
  #banner .txt { text-align: left; }
  #banner h1 {
    font-size: clamp(22px, 5vw, 38px); font-weight: 900; letter-spacing: -0.5px; line-height: 1.05;
    text-shadow: 0 2px 16px rgba(0,0,0,0.5);
  }
  #banner h1 span { color: var(--accent); }
  #banner .sub { font-size: 14px; color: var(--muted); margin-top: 3px; }

  /* ---- circular rep progress ---- */
  #counter { position: absolute; left: 50%; bottom: 104px; transform: translateX(-50%); width: 152px; height: 152px; }
  .ring-bg { fill: none; stroke: rgba(255,255,255,0.10); stroke-width: 8; }
  .ring-fg {
    fill: none; stroke: var(--accent); stroke-width: 8; stroke-linecap: round;
    stroke-dasharray: 326.726; stroke-dashoffset: 326.726;
    transform: rotate(-90deg); transform-origin: 60px 60px;
    transition: stroke-dashoffset 0.35s cubic-bezier(.2,.8,.2,1);
    filter: drop-shadow(0 0 6px rgba(126,217,87,0.55));
  }
  .ring-center { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  #repCount { font-size: 58px; font-weight: 800; line-height: 1; }
  #repCount.flash { animation: pop 0.25s ease; }
  @keyframes pop { 0% { transform: scale(1); } 40% { transform: scale(1.3); } 100% { transform: scale(1); } }
  #repOf { font-size: 13px; color: var(--muted); margin-top: 3px; letter-spacing: 1px; }
  #stateLabel {
    position: absolute; left: 50%; bottom: 68px; transform: translateX(-50%);
    font-size: 12px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted);
  }

  /* ---- countdown ---- */
  #centerMsg { position: absolute; top: 42%; left: 50%; transform: translate(-50%,-50%); text-align: center; pointer-events: none; }
  #centerMsg .tick {
    display: inline-block; font-size: clamp(90px, 20vw, 160px); font-weight: 900; color: var(--text);
    animation: countPop 0.8s ease both; text-shadow: 0 8px 40px rgba(0,0,0,0.55);
  }
  #centerMsg .tick.go { color: var(--accent); text-shadow: 0 0 44px rgba(126,217,87,0.65); }
  @keyframes countPop {
    0%   { opacity: 0; transform: scale(1.7); letter-spacing: 8px; }
    22%  { opacity: 1; transform: scale(1);   letter-spacing: 0; }
    78%  { opacity: 1; transform: scale(1); }
    100% { opacity: 0; transform: scale(0.85); }
  }

  /* ---- start / done overlays ---- */
  .screen {
    position: fixed; inset: 0; z-index: 30;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center; padding: 28px; gap: 8px;
    background:
      radial-gradient(90% 60% at 50% 30%, rgba(126,217,87,0.10), transparent 60%),
      rgba(8,11,8,0.94);
    backdrop-filter: blur(10px);
  }
  #doneScreen { display: none; }
  #brand { width: 108px; height: 108px; border-radius: 24px; margin-bottom: 4px; box-shadow: 0 0 40px rgba(126,217,87,0.28); }
  .done-ic { color: var(--accent); filter: drop-shadow(0 0 16px rgba(126,217,87,0.55)); margin-bottom: 4px; }
  .big { font-size: clamp(28px, 6.5vw, 54px); font-weight: 900; letter-spacing: -0.5px; }
  .muted { color: #9fb097; font-size: 16px; max-width: 470px; line-height: 1.5; }
  .muted b { color: var(--text); }
  button {
    pointer-events: auto; cursor: pointer; border: none; margin-top: 20px;
    padding: 16px 46px; border-radius: 999px; font-size: 18px; font-weight: 800;
    color: #072208; background: linear-gradient(180deg, var(--accent-bright), var(--accent));
    box-shadow: 0 8px 26px rgba(126,217,87,0.32);
  }
  button:disabled { opacity: 0.6; cursor: default; box-shadow: none; }
  #switchExerciseBtn {
    margin-top: 10px;
    padding: 12px 28px;
    font-size: 15px;
    background: transparent;
    color: var(--accent);
    border: 1px solid rgba(126,217,87,0.55);
    box-shadow: none;
  }
  #switchExerciseBtn:hover {
    background: rgba(126,217,87,0.10);
  }
  .tiny { color: #62755b; font-size: 12px; margin-top: 18px; max-width: 430px; line-height: 1.5; }
  #startErr { color: #f8b4b4; font-size: 14px; margin-top: 14px; max-width: 520px; line-height: 1.5; }

  /* clean (non-emoji) confetti */
  .confetti { position: fixed; top: -30px; z-index: 40; pointer-events: none; border-radius: 2px; animation: fall linear forwards; }
  @keyframes fall { to { transform: translateY(112vh) rotate(680deg); opacity: 0.12; } }
</style>
</head>
<body>

  <canvas id="stage"></canvas>
  <video id="video" autoplay playsinline muted style="display:none"></video>

  <div id="hud">
    <div id="scrim"></div>

    <div id="banner">
      <svg class="ic" width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="4.5" y="10.5" width="15" height="10" rx="2.2"></rect>
        <path d="M8 10.5V7.5a4 4 0 0 1 8 0v3"></path>
      </svg>
      <div class="txt">
        <h1><span id="siteName">FEED</span> LOCKED</h1>
        <div class="sub">Do <span id="goalText">5</span> <span id="exerciseName">squats</span> to break the lock</div>
      </div>
    </div>

    <div id="counter">
      <svg viewBox="0 0 120 120" width="152" height="152">
        <circle class="ring-bg" cx="60" cy="60" r="52"></circle>
        <circle id="ringFg" class="ring-fg" cx="60" cy="60" r="52"></circle>
      </svg>
      <div class="ring-center">
        <div id="repCount">0</div>
        <div id="repOf">/ <span id="goalText2">5</span></div>
      </div>
    </div>
    <div id="stateLabel">press start to begin</div>

    <div id="centerMsg"></div>
  </div>

  <!-- Start overlay -->
  <div id="startScreen" class="screen">
    <img id="brand" src="logo.png" alt="DoomFitness" />
    <div class="big">You've been caught scrolling</div>
    <div class="muted">The only way back to <b id="siteName2">your feed</b> is <b><span id="goalText3">5</span> <span id="exerciseName2">squats</span></b>. <span id="exerciseHelp">Stand back so your hips and knees are in frame.</span></div>
    <button id="startBtn">Start Camera</button>
    <button id="switchExerciseBtn" type="button">Switch Exercise</button>
    <div class="tiny">Runs entirely on your machine — the camera feed never leaves this device.</div>
    <div id="startErr"></div>
  </div>

  <!-- Done overlay -->
  <div id="doneScreen" class="screen">
    <svg class="done-ic" width="76" height="76" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="9"></circle>
      <path d="M8.5 12.5l2.4 2.4 4.6-5"></path>
    </svg>
    <div class="big" style="color:var(--accent)">Unlocked</div>
    <div class="muted" id="doneMsg">Nice. Sending you back…</div>
  </div>

  <script src="setup.js"></script>
  <script src="tf.min.js"></script>
  <script src="pose-detection.min.js"></script>
  <script src="lock.js"></script>
</body>
</html>
